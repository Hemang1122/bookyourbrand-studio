type User @table {
  displayName: String!
  email: String!
  createdAt: Timestamp!
  photoUrl: String
  role: String
}

type Client @table {
  name: String!
  email: String!
  createdAt: Timestamp!
  company: String
  phone: String
  address: String
}

type Project @table {
  title: String!
  status: String!
  startDate: Date!
  dueDate: Date!
  createdAt: Timestamp!
  description: String
  budget: Float
  client: Client
  projectManager: User
}

type Asset @table {
  fileName: String!
  fileType: String!
  fileUrl: String!
  uploadedAt: Timestamp!
  description: String
  thumbnailUrl: String
  project: Project
}

type Invoice @table {
  invoiceNumber: String!
  amount: Float!
  currency: String!
  issueDate: Date!
  dueDate: Date!
  status: String!
  createdAt: Timestamp!
  notes: String
  project: Project
  client: Client
}